<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CONTACT</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@400;500;700&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:     #0a0a0a;
  --green:  #00ff41;
  --dim:    #007f21;
  --red:    #ff3333;
  --yellow: #ffff00;
  --white:  #cccccc;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Noto Sans Mono', 'Fira Code', monospace;
  font-size: 13px;
  line-height: 1.7;
  padding: 20px 24px;
}

.section-title {
  color: var(--green);
  font-size: 11px;
  letter-spacing: .1em;
  text-shadow: 0 0 6px rgba(0,255,65,.5);
  margin-bottom: 16px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--dim);
}

.contact-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.contact-item {
  display: flex;
  align-items: baseline;
  gap: 16px;
  padding: 8px 12px;
  border: 1px solid rgba(0,127,33,.3);
  transition: border-color .15s, background .15s;
}

.contact-item:hover {
  border-color: var(--dim);
  background: rgba(0,255,65,.03);
}

.contact-label {
  color: var(--dim);
  font-size: 11px;
  letter-spacing: .06em;
  min-width: 72px;
  flex-shrink: 0;
}

.contact-value {
  color: var(--white);
}

.contact-value a {
  color: var(--green);
  text-decoration: none;
  text-shadow: 0 0 4px rgba(0,255,65,.3);
  transition: text-shadow .15s;
}

.contact-value a:hover {
  text-shadow: 0 0 10px rgba(0,255,65,.7);
}

.divider {
  border: none;
  border-top: 1px solid rgba(0,127,33,.25);
  margin: 20px 0;
}

.note {
  color: var(--dim);
  font-size: 11px;
  letter-spacing: .04em;
}
</style>
</head>
<body>

<div class="section-title">// CONTACT</div>

<ul class="contact-list">
  <li class="contact-item">
    <span class="contact-label">Email</span>
    <span class="contact-value">
      <a href="mailto:hello@example.com">hello@example.com</a>
    </span>
  </li>
  <li class="contact-item">
    <span class="contact-label">GitHub</span>
    <span class="contact-value">
      <a href="https://github.com/example" target="_blank" rel="noopener noreferrer">github.com/example</a>
    </span>
  </li>
  <li class="contact-item">
    <span class="contact-label">Twitter</span>
    <span class="contact-value">
      <a href="https://twitter.com/example" target="_blank" rel="noopener noreferrer">@example</a>
    </span>
  </li>
  <li class="contact-item">
    <span class="contact-label">PGP</span>
    <span class="contact-value">4D2A 8F1B C3E9 7A20 ...</span>
  </li>
</ul>

<hr class="divider"/>
<p class="note">— 응답은 보통 24시간 이내에 드립니다.</p>

</body>
</html>
