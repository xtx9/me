<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Terminal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💻</text></svg>"/>

<!-- Google Fonts: Noto Sans Mono (한글 지원 등폭 폰트) + Fira Code (폴백) -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@400;500;700&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet"/>

<!--
  ────────────────────────────────────────────────────────────
  CSS 구조 (2파일로 분리)

  css/terminal.css
    - CSS 변수 / 전역 리셋
    - 터미널 레이아웃 (#app, #terminal)
    - 타이틀바, 출력 영역, 프롬프트 바
    - 텍스트 색상 유틸리티 (.c-green 등)
    - 미디어 공통 + 이미지 + 비디오 + YouTube
    - 컨트롤 바 공용 + 볼륨 슬라이더
    - help 메뉴, 로고, 애니메이션

  css/audio-player.css
    - 비주얼라이저 캔버스 (.vis-wrap)
    - 옵션 패널 오버레이 (.vis-panel, .panel-tabs)
    - 반복 버튼 상태 표시 (.repeat-btn, .repeat-btn.repeat-on)
    - 플레이어 내 인라인 플레이리스트 (.pl-view)
    - 전체화면 모드 (.player-fs)
  ────────────────────────────────────────────────────────────
-->
<link rel="stylesheet" href="css/terminal.css"/>
<link rel="stylesheet" href="css/audio-player.css"/>
<link rel="stylesheet" href="css/video-player.css"/>
<link rel="stylesheet" href="css/doc-viewer.css"/>

<!-- Firebase Analytics — module 방식, 가능한 일찍 fetch 시작 -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";
  const firebaseConfig = {
    apiKey: "AIzaSyBOP1Fr24TignmUpoMTpOI81ZdWzPfbwYw",
    authDomain: "sf-terminal-theme.firebaseapp.com",
    projectId: "sf-terminal-theme",
    storageBucket: "sf-terminal-theme.firebasestorage.app",
    messagingSenderId: "264299184102",
    appId: "1:264299184102:web:caad9b4cff95f98a1ee027",
    measurementId: "G-0QKY1209MT"
  };
  try {
    const app = initializeApp(firebaseConfig);
    getAnalytics(app);
    window.__firebaseReady = true;
  } catch (e) {
    window.__firebaseReady = false;
    window.__firebaseError = e.message;
  }
</script>
</head>
<body>
<div id="app">
  <div id="terminal">

    <div id="titlebar">
      <nav class="titlebar-nav">
        <button class="tnav-btn" onclick="runCommand('project')">프로젝트</button>
        <button class="tnav-btn" onclick="runCommand('contact')">Contact</button>
      </nav>
      <span id="title-text">guest@system:~</span>
      <span id="clock" class="conn"></span>
    </div>

    <div id="output"></div>

    <div id="promptbar" onclick="focusInput()">
      <div id="prompt-row">
        <button class="attach-btn" title="파일 첨부" onclick="event.stopPropagation();fileInput.click()">+</button>
        <input id="file-input" type="file" style="display:none" accept="image/*,video/*,audio/*,*"/>
        <span class="puser">$</span>
        <textarea id="real-input" rows="1" autocomplete="off" spellcheck="false"
          placeholder="Enter=실행 | ↑↓=히스토리 | /·?=help | +=파일첨부"></textarea>
        <button class="clear-btn" title="화면 지우기 (Clear)" onclick="event.stopPropagation();output.innerHTML=''">[×]</button>
        <button class="send-btn" title="실행 (Enter)" onclick="event.stopPropagation();sendInput()">➤</button>
      </div>
    </div>

    <footer id="terminal-footer">
      <a href="#" class="footer-link" onclick="return false;">소개</a>
      <span class="footer-sep">·</span>
      <a href="#" class="footer-link" onclick="return false;">제휴제안</a>
      <span class="footer-sep">·</span>
      <a href="#" class="footer-link" onclick="return false;">이용약관</a>
      <span class="footer-sep">·</span>
      <a href="#" class="footer-link" onclick="return false;">개인정보처리방침</a>
      <span class="footer-sep">·</span>
      <a href="#" class="footer-link" onclick="return false;">정책</a>
    </footer>

  </div>
</div>

<!--
  ════════════════════════════════════════════════════════════
  JS 모듈 로딩 순서 (의존 관계에 따라 순서 고정)

  1. terminal-state.js    — DOM 참조 · 상태 변수 · 공통 유틸 · 시계
  2. terminal-output.js   — 화면 출력 헬퍼 · 미디어 렌더러
  3. terminal-commands.js — 명령어 목록 · help · runCommand · execCmd
  4. terminal-input.js    — 입력창 이벤트 리스너
  5. audio-visualizer.js  — 오디오 플레이어 (renderAudio)
  6. video-player.js      — 비디오 플레이어 (renderVideo)
  7. boot.js              — JSON 기반 부팅 시스템 (마지막 실행)
  ════════════════════════════════════════════════════════════
-->

<!-- 1. 초기화 — DOM 참조, 상태, 유틸, 시계 -->
<script src="js/terminal-state.js"></script>

<!-- 2. 출력 — 텍스트·이미지·YouTube 렌더링 -->
<script src="js/terminal-output.js"></script>

<!-- 3. 명령어 — CMDS_LIST, renderHelp, runCommand, execCmd -->
<script src="js/terminal-commands.js"></script>

<!-- 4. 입력창 — 이벤트 리스너 (Enter·↑↓·파일 첨부) -->
<script src="js/terminal-input.js"></script>

<!-- 5. 오디오 비주얼라이저 모듈 (AudioVisualizer / renderAudio) -->
<script src="js/audio-visualizer.js"></script>

<!-- 6. 동영상 플레이어 모듈 (VideoPlayer / renderVideo) -->
<script src="js/video-player.js"></script>

<!-- 7. JSON 기반 부팅 시스템 — 모든 전역 함수 로드 완료 후 실행 -->
<script src="js/boot.js"></script>

</body>
</html>
