<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Terminal</title>

<!-- Google Fonts: Fira Code (터미널 고정폭 폰트) -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet"/>

<!--
  ────────────────────────────────────────────────────────────
  CSS 구조 (2파일로 분리)

  css/terminal.css
    - CSS 변수 / 전역 리셋
    - 터미널 레이아웃 (#app, #terminal)
    - 타이틀바, 출력 영역, 프롬프트 바
    - 텍스트 색상 유틸리티 (.c-green 등)
    - 미디어 공통 + 이미지 + 비디오 + YouTube
    - 컨트롤 바 공용 + 볼륨 슬라이더
    - help 메뉴, 로고, 애니메이션

  css/audio-player.css
    - 비주얼라이저 캔버스 (.vis-wrap)
    - 옵션 패널 오버레이 (.vis-panel, .panel-tabs)
    - 반복 버튼 상태 표시 (.repeat-btn, .repeat-btn.repeat-on)
    - 플레이어 내 인라인 플레이리스트 (.pl-view)
    - 전체화면 모드 (.player-fs)
  ────────────────────────────────────────────────────────────
-->
<link rel="stylesheet" href="css/terminal.css"/>
<link rel="stylesheet" href="css/audio-player.css"/>
<link rel="stylesheet" href="css/video-player.css"/>
</head>
<body>
<div id="app">
  <div id="terminal">

    <div id="titlebar">
      <div class="dots">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
      </div>
      <span id="title-text">guest@system:~ — uptime: 0m 0s</span>
      <span class="conn">ssh 192.168.1.1</span>
    </div>

    <div id="output"></div>

    <div id="promptbar" onclick="focusInput()">
      <div id="prompt-row">
        <button class="attach-btn" title="파일 첨부" onclick="event.stopPropagation();fileInput.click()">+</button>
        <input id="file-input" type="file" style="display:none" accept="image/*,video/*,audio/*,*"/>
        <span class="pts" id="prompt-ts"></span>
        <span class="puser">guest@system:~$</span>
        <textarea id="real-input" rows="1" autocomplete="off" spellcheck="false"></textarea>
      </div>
      <div id="hint">Enter = 실행 &nbsp;|&nbsp; Shift+Enter = 줄바꿈 &nbsp;|&nbsp; ↑↓ = 히스토리 &nbsp;|&nbsp; + = 파일 첨부</div>
    </div>

  </div>
</div>

<script>
/* ═══════════════════════════════ STATE ══════════════════════════════ */
const output    = document.getElementById('output');
const realInput = document.getElementById('real-input');
const promptTs  = document.getElementById('prompt-ts');
const titleText = document.getElementById('title-text');
const promptbar = document.getElementById('promptbar');
const fileInput = document.getElementById('file-input');

let cmdHistory = [], histIdx = -1, uptimeSec = 0, booting = true;

/* ═══════════════════════════════ HELPERS ════════════════════════════ */
function now() {
  const d = new Date();
  return [d.getHours(),d.getMinutes(),d.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
}
function fmtTime(s){
  if(!isFinite(s))return'00:00';
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(Math.floor(s%60)).padStart(2,'0')}`;
}
function scrollBottom(){output.scrollTop=output.scrollHeight}
function focusInput(){if(!booting&&!window.getSelection().toString())realInput.focus()}

setInterval(()=>{
  uptimeSec++;
  titleText.textContent=`guest@system:~ — uptime: ${Math.floor(uptimeSec/60)}m ${uptimeSec%60}s`;
},1000);
setInterval(()=>{promptTs.textContent=`[${now()}]`},500);
promptTs.textContent=`[${now()}]`;

/* ═══════════════════════════════ RENDER ════════════════════════════ */
/* parse URLs in a string and return a DocumentFragment */
function textToNodes(text){
  const frag=document.createDocumentFragment();
  const URL_RE=/(https?:\/\/[^\s]+)/g;
  const parts=text.split(URL_RE);
  parts.forEach(p=>{
    if(/^https?:\/\//.test(p)){
      const a=document.createElement('a');
      a.href=p;a.textContent=p;a.target='_blank';a.rel='noopener noreferrer';
      a.className='turl';a.onclick=e=>e.stopPropagation();
      frag.appendChild(a);
    } else {
      frag.appendChild(document.createTextNode(p));
    }
  });
  return frag;
}

function appendRaw(node,withTs){
  const row=document.createElement('div');
  row.className='line glow';
  if(withTs){
    const ts=document.createElement('span');
    ts.className='ts';ts.textContent=`[${now()}]`;
    row.appendChild(ts);
  }
  row.appendChild(node);
  output.appendChild(row);
  scrollBottom();
}

function appendText(text,colorClass,withTs){
  if(text===''){const s=document.createElement('div');s.className='line spacer';output.appendChild(s);scrollBottom();return;}
  const wrap=document.createElement('div');
  wrap.className=`text ${colorClass}`;
  wrap.appendChild(textToNodes(text));
  appendRaw(wrap,withTs);
}

function appendLines(lines,colorClass,withTs){
  lines.forEach(l=>appendText(l,colorClass,withTs));
}

function appendNode(node,withTs){
  const wrap=document.createElement('div');
  wrap.appendChild(node);
  appendRaw(wrap,withTs);
}

/* ── help menu ─────────────────────────────────────── */
const CMDS_LIST=[
  {cmd:'about',    desc:'prints user bio'},
  {cmd:'skills',   desc:'displays skills table'},
  {cmd:'projects', desc:'lists projects'},
  {cmd:'contact',  desc:'shows contact info'},
  {cmd:'whoami',   desc:'prints current user'},
  {cmd:'date',     desc:'prints current date/time'},
  {cmd:'ls',       desc:'list directory contents'},
  {cmd:'cat README.md',desc:'print README file'},
  {cmd:'uname -a', desc:'prints system info'},
  {cmd:'clear',    desc:'clears the terminal'},
  {cmd:'help',     desc:'shows this message'},
  {cmd:'https://youtu.be/...', desc:'paste YouTube URL to play video'},
];

function renderHelp(){
  const wrap=document.createElement('div');
  wrap.className='help-table';
  const label=document.createElement('div');
  label.style.cssText='color:var(--dim);font-size:11px;margin-bottom:4px';
  label.textContent='Available commands — click to run:';
  wrap.appendChild(label);
  CMDS_LIST.forEach(({cmd,desc})=>{
    const row=document.createElement('div');row.className='help-row';
    const btn=document.createElement('button');
    btn.className='help-cmd';btn.textContent=cmd;
    btn.onclick=(e)=>{e.stopPropagation();runCommand(cmd);};
    const d=document.createElement('span');d.className='help-desc';d.textContent='— '+desc;
    row.appendChild(btn);row.appendChild(d);wrap.appendChild(row);
  });
  return wrap;
}

/* ═══════════════════════════════ MEDIA ════════════════════════════ */
/* ── image ─────────────────────────────────────────── */
function renderImage(file){
  const url=URL.createObjectURL(file);
  const div=document.createElement('div');div.className='img-out';

  const meta=document.createElement('div');meta.className='media-meta';

  const img=document.createElement('img');img.src=url;
  img.onload=()=>{
    meta.innerHTML=
      `<span>FILE: ${file.name}</span>`+
      `<span>SIZE: ${(file.size/1024).toFixed(1)} KB</span>`+
      `<span>RES: ${img.naturalWidth} x ${img.naturalHeight} px</span>`;
    scrollBottom();
  };
  img.onerror=()=>{ meta.textContent='이미지를 불러올 수 없습니다.'; };

  div.appendChild(meta);div.appendChild(img);

  appendText(`guest@system:~$ [file attached: ${file.name}]`,'c-green',true);
  appendNode(div,false);
}

/* ── video ─────────────────────────────────────────── */
/* renderVideo(file) 함수는 js/video-player.js 에 정의되어 있습니다.
   플레이리스트 / 반복 3단계 / 브라우저+모니터 전체화면 기능 포함.
   이 파일이 먼저 실행된 뒤 video-player.js 가 로드됩니다. */


/* helpers */
function makeBtn(label,onclick){
  const b=document.createElement('button');
  b.className='ctrl-btn';b.textContent=label;b.onclick=onclick;return b;
}
function makeRange(init,onchange){
  const r=document.createElement('input');
  r.type='range';r.min=0;r.max=1;r.step=.05;r.value=init;
  r.oninput=()=>onchange(parseFloat(r.value));
  return r;
}

/* ── youtube ───────────────────────────────────────── */
function getYouTubeId(url){
  try{
    const u=new URL(url);
    if(u.hostname==='youtu.be') return u.pathname.slice(1).split('?')[0];
    if(u.hostname.includes('youtube.com')){
      const v=u.searchParams.get('v');
      if(v) return v;
      const m=u.pathname.match(/\/embed\/([^/?]+)/);
      if(m) return m[1];
    }
  }catch(e){}
  return null;
}

function renderYouTube(url,videoId){
  const wrap=document.createElement('div');wrap.className='yt-wrap';

  const meta=document.createElement('div');meta.className='media-meta';
  meta.innerHTML=`<span>YouTube</span><span>${url}</span>`;
  wrap.appendChild(meta);

  const box=document.createElement('div');box.className='yt-frame-box';
  const iframe=document.createElement('iframe');
  iframe.src=`https://www.youtube.com/embed/${videoId}?autoplay=1`;
  iframe.allow='accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
  iframe.allowFullscreen=true;
  box.appendChild(iframe);
  wrap.appendChild(box);

  appendNode(wrap,false);
  scrollBottom();
}

/* ── file input handler ─────────────────────────────── */
fileInput.addEventListener('change',()=>{
  const file=fileInput.files[0];if(!file)return;
  fileInput.value='';
  if(file.type.startsWith('image/'))      renderImage(file);
  else if(file.type.startsWith('video/')) renderVideo(file);
  else if(file.type.startsWith('audio/')) renderAudio(file);
  else{
    appendText(`guest@system:~$ [file attached: ${file.name}]`,'c-green',true);
    appendLines([`FILE: ${file.name}`,`SIZE: ${(file.size/1024).toFixed(1)} KB`,`TYPE: ${file.type||'unknown'}`],'c-white',true);
  }
});

/* ═══════════════════════════════ COMMANDS ══════════════════════════ */
function runCommand(raw){
  const trimmed=raw.trim();if(!trimmed)return;
  appendText(`guest@system:~$ ${trimmed}`,'c-green',true);
  cmdHistory.unshift(trimmed);histIdx=-1;

  /* YouTube URL 자동 감지 */
  const ytId=getYouTubeId(trimmed);
  if(ytId){renderYouTube(trimmed,ytId);return;}

  const parts=trimmed.split(/\s+/);
  const cmd=parts[0].toLowerCase();
  const args=parts.slice(1);
  execCmd(cmd,args,trimmed);
}

function execCmd(cmd,args,full){
  switch(cmd){
    case 'help':
      appendNode(renderHelp(),true);break;

    case 'about':
      appendLines([
        "Hi, I'm a developer. I build things for the web and beyond.",
        "I enjoy creating functional, raw, and highly intentional interfaces.",
        "This terminal is a reflection of how I work: keyboard-first,",
        "low latency, no fluff. If you're reading this, you know what I mean.",
      ],'c-white',true);break;

    case 'skills':
      appendLines([
        '+-------------------+-----------------------------------------+',
        '| Category          | Technologies                            |',
        '+-------------------+-----------------------------------------+',
        '| Languages         | TypeScript, JavaScript, Rust, Python    |',
        '| Frontend          | React, TailwindCSS, Next.js, HTML/CSS   |',
        '| Backend           | Node.js, Express, PostgreSQL, Redis     |',
        '| Tools             | Git, Docker, Linux, Neovim, Bash        |',
        '+-------------------+-----------------------------------------+',
      ],'c-white',true);break;

    case 'projects':
      appendLines([
        '[1] project-alpha   : A distributed messaging system built in Rust.',
        '                      Status: active | Stars: 842',
        '[2] react-terminal  : This website! Built with HTML, CSS, JS.',
        '                      Status: active | Stars: 314',
        '[3] data-viz-engine : A dashboard for visualizing complex datasets.',
        '                      Status: archived | Stars: 207',
        '[4] cli-toolkit     : A collection of shell utilities for devs.',
        '                      Status: active | Stars: 91',
      ],'c-white',true);break;

    case 'contact':
      appendLines([
        'Email  : hello@example.com',
        'GitHub : https://github.com/example',
        'Twitter: https://twitter.com/example',
        'PGP    : fingerprint 4D2A 8F1B C3E9 7A20 ...',
      ],'c-white',true);break;

    case 'whoami': appendText('guest','c-white',true);break;
    case 'date':   appendText(new Date().toString(),'c-white',true);break;

    case 'ls':
      appendLines([
        'drwxr-xr-x  projects/',
        'drwxr-xr-x  scripts/',
        '-rw-r--r--  README.md',
        '-rw-r--r--  package.json',
        '-rwxr-xr-x  deploy.sh',
      ],'c-white',true);break;

    case 'cat':
      if(args[0]==='README.md'||args[0]==='readme.md'){
        appendLines([
          '# hello, world','',
          'This terminal is my digital home.',
          'Built with pure HTML, CSS and JavaScript.','',
          "Type 'help' to see what you can do here.",
          "Type 'about' to learn about me.",
          "Type 'projects' to see what I've built.",'',
          '-- guest',
        ],'c-white',true);
      } else if(!args[0]) appendText('cat: missing file operand','c-red',true);
      else appendText(`cat: ${args[0]}: No such file or directory`,'c-red',true);
      break;

    case 'uname':
      appendText('Linux system 6.1.0-18-amd64 #1 SMP PREEMPT_DYNAMIC Debian 6.1.76-1 (2024-02-01) x86_64 GNU/Linux','c-white',true);break;

    case 'clear': output.innerHTML='';break;

    default:
      appendText(`bash: ${cmd}: command not found. Type 'help' for available commands.`,'c-red',true);
  }
}

/* ═══════════════════════════════ INPUT ════════════════════════════ */
function autoResize(){realInput.style.height='auto';realInput.style.height=realInput.scrollHeight+'px'}

realInput.addEventListener('input',autoResize);
realInput.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    const val=realInput.value;
    realInput.value='';realInput.style.height='auto';
    runCommand(val);
  } else if(e.key==='ArrowUp'&&!realInput.value.includes('\n')){
    e.preventDefault();
    if(histIdx<cmdHistory.length-1)histIdx++;
    realInput.value=cmdHistory[histIdx]||'';autoResize();
  } else if(e.key==='ArrowDown'&&!realInput.value.includes('\n')){
    e.preventDefault();
    if(histIdx>0){histIdx--;realInput.value=cmdHistory[histIdx]||'';}
    else if(histIdx===0){histIdx=-1;realInput.value='';}
    autoResize();
  }
});
document.getElementById('terminal').addEventListener('click',focusInput);

/* ═══════════════════════════════ BOOT ═════════════════════════════ */
const LOGO=[
  '   _____ _    _  ______  _____ _______    ____   _____ ',
  '  / ____| |  | |/ ____/ / ____|__   __|  / __ \\ / ____|',
  ' | |  __| |  | | (___  | (___    | |    | |  | | (___  ',
  ' | | |_ | |  | |\\___ \\  \\___ \\   | |    | |  | |\\___ \\ ',
  ' | |__| | |__| |____) | ____) |  | |    | |__| |____) |',
  '  \\_____|\\____/|_____/ |_____/   |_|     \\____/|_____/ ',
].join('\n');

const BOOT_MSGS=[
  {t:'[  OK  ] Started udev Kernel Device Manager.',c:'c-green'},
  {t:'[  OK  ] Mounted /proc - Kernel Proc File System.',c:'c-green'},
  {t:'[  OK  ] Started Network Name Resolution.',c:'c-green'},
  {t:'[  OK  ] Started OpenSSH Daemon.',c:'c-green'},
  {t:'[  OK  ] Reached target Multi-User System.',c:'c-green'},
  {t:'Checking system integrity............ PASS',c:'c-white'},
  {t:'Decrypting user partition............. DONE',c:'c-white'},
  {t:'Loading user profile.................. OK',c:'c-white'},
  {t:'Establishing secure channel........... CONNECTED',c:'c-white'},
  {t:'',c:'c-white'},
  {t:`GUEST_OS v9.4.2 LTS  Last login: ${new Date().toDateString()}`,c:'c-dim'},
  {t:"Type 'help' to see available commands.",c:'c-dim'},
];

function runBoot(){
  promptbar.style.display='none';
  const logoPre=document.createElement('pre');logoPre.id='logo';logoPre.textContent='';output.appendChild(logoPre);
  let i=0;
  const logoTimer=setInterval(()=>{
    i+=3;logoPre.textContent=LOGO.substring(0,i);scrollBottom();
    if(i>=LOGO.length){clearInterval(logoTimer);logoPre.textContent=LOGO;setTimeout(runMsgs,200);}
  },5);
  function runMsgs(){
    let mi=0;
    const msgTimer=setInterval(()=>{
      if(mi>=BOOT_MSGS.length){clearInterval(msgTimer);bootDone();return;}
      const{t,c}=BOOT_MSGS[mi++];
      if(t===''){const s=document.createElement('div');s.className='line spacer';output.appendChild(s);scrollBottom();}
      else appendText(t,c,false);
    },85);
  }
  function bootDone(){booting=false;promptbar.style.display='';realInput.focus();}
}

runBoot();
</script>

<!-- ─── 오디오 비주얼라이저 모듈 (AudioVisualizer / renderAudio) ───
     메인 스크립트(위)가 먼저 실행된 뒤 로드되므로
     fmtTime / makeBtn / makeRange 등 전역 함수를 정상적으로 참조합니다. -->
<script src="js/audio-visualizer.js"></script>

<!-- ─── 동영상 플레이어 모듈 (VideoPlayer / renderVideo) ───
     audio-visualizer.js 이후에 로드됩니다.
     플레이리스트 · 반복3단계 · 브라우저/모니터 전체화면 기능 포함 -->
<script src="js/video-player.js"></script>
</body>
</html>
